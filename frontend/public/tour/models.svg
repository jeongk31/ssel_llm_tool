<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <rect width="560" height="360" fill="#f5f6f8"/>
  <rect x="16" y="16" width="528" height="328" rx="10" fill="#ffffff" stroke="#e3e5ea"/>
  <circle cx="40" cy="44" r="11" fill="#5b2d8e"/>
  <text x="40" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">4</text>
  <text x="60" y="48" fill="#1b1f27" font-size="14" font-weight="700">Models &amp; Aggregation</text>
  <!-- model slot -->
  <rect x="32" y="72" width="496" height="120" rx="8" fill="#fff" stroke="#e3e5ea"/>
  <rect x="32" y="72" width="496" height="30" rx="8" fill="#f5f6f8"/>
  <circle cx="50" cy="87" r="8" fill="#5b2d8e"/><text x="50" y="91" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
  <text x="66" y="91" fill="#1b1f27" font-size="12" font-weight="600">OpenAI — GPT-4.1 Mini</text>
  <!-- fields: provider (narrow) model (narrow) api key (wide) -->
  <text x="48" y="124" fill="#5f6577" font-size="10" font-weight="600">PROVIDER</text>
  <rect x="48" y="130" width="96" height="30" rx="6" fill="#fff" stroke="#e3e5ea"/><text x="58" y="150" fill="#1b1f27" font-size="11">OpenAI ▾</text>
  <text x="156" y="124" fill="#5f6577" font-size="10" font-weight="600">MODEL</text>
  <rect x="156" y="130" width="110" height="30" rx="6" fill="#fff" stroke="#e3e5ea"/><text x="166" y="150" fill="#1b1f27" font-size="11">GPT-4.1 Mini ▾</text>
  <text x="278" y="124" fill="#5f6577" font-size="10" font-weight="600">API KEY</text>
  <rect x="278" y="130" width="234" height="30" rx="6" fill="#fff" stroke="#e3e5ea"/><text x="288" y="150" fill="#1b1f27" font-size="11" font-family="monospace">sk-•••••••••••••••••••••••••</text>
  <text x="32" y="216" fill="#7c4daf" font-size="12" font-weight="600">+ Add Model</text>
  <!-- aggregation -->
  <text x="48" y="250" fill="#5f6577" font-size="10" font-weight="600">RUNS PER MODEL  3×</text>
  <rect x="48" y="258" width="200" height="6" rx="3" fill="#e3e5ea"/><rect x="48" y="258" width="60" height="6" rx="3" fill="#5b2d8e"/>
  <text x="300" y="250" fill="#5f6577" font-size="10" font-weight="600">AGGREGATION</text>
  <rect x="300" y="256" width="212" height="30" rx="6" fill="#fff" stroke="#e3e5ea"/><text x="310" y="276" fill="#1b1f27" font-size="11">Mode (majority vote) ▾</text>
  <rect x="32" y="306" width="496" height="26" rx="6" fill="#f3eef8"/>
  <text x="44" y="323" fill="#5b2d8e" font-size="11">1 model × 3 runs = 3 calls/row · majority vote across all calls</text>
</svg>
