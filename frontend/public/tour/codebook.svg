<svg xmlns="http://www.w3.org/2000/svg" width="560" height="600" viewBox="0 0 560 600" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <rect width="560" height="600" fill="#f5f6f8"/>
  <rect x="16" y="16" width="528" height="568" rx="10" fill="#ffffff" stroke="#e3e5ea"/>
  <!-- header -->
  <circle cx="40" cy="44" r="11" fill="#5b2d8e"/>
  <text x="40" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">1</text>
  <text x="60" y="48" fill="#1b1f27" font-size="14" font-weight="700">Coding Instructions &amp; Codebook</text>

  <!-- coding instructions -->
  <text x="32" y="82" fill="#5f6577" font-size="11" font-weight="600">DESCRIBE HOW CODING SHOULD BE PERFORMED</text>
  <rect x="32" y="90" width="496" height="118" rx="6" fill="#fff" stroke="#e3e5ea"/>
  <text x="44" y="110" fill="#1b1f27" font-size="11">Your Coding Task: classify each message from Player B into</text>
  <text x="44" y="128" fill="#1b1f27" font-size="11">one category.</text>
  <text x="44" y="150" fill="#1b1f27" font-size="11">• Promise (P): states intent to Roll if A chooses In.</text>
  <text x="44" y="168" fill="#1b1f27" font-size="11">• Empty Talk (E): greetings, jokes, no real promise.</text>
  <text x="44" y="186" fill="#1b1f27" font-size="11">• No Message (N): blank / opted out.</text>

  <!-- empty handling -->
  <text x="32" y="234" fill="#5f6577" font-size="11" font-weight="600">EMPTY MESSAGES</text>
  <rect x="32" y="242" width="240" height="30" rx="6" fill="#fff" stroke="#e3e5ea"/>
  <text x="44" y="262" fill="#1b1f27" font-size="11">Ignore (skip row) ▾</text>

  <!-- codebook table -->
  <text x="32" y="304" fill="#5f6577" font-size="11" font-weight="600">CODEBOOK</text>
  <rect x="32" y="312" width="496" height="120" rx="6" fill="#fff" stroke="#e3e5ea"/>
  <rect x="32" y="312" width="496" height="28" fill="#f5f6f8"/>
  <text x="44" y="330" fill="#5f6577" font-size="11" font-weight="600">Label</text>
  <text x="170" y="330" fill="#5f6577" font-size="11" font-weight="600">Type</text>
  <text x="290" y="330" fill="#5f6577" font-size="11" font-weight="600">Level</text>
  <text x="410" y="330" fill="#5f6577" font-size="11" font-weight="600">Coded Values</text>
  <line x1="32" y1="340" x2="528" y2="340" stroke="#edeef1"/>
  <text x="44" y="360" fill="#1b1f27" font-size="12">promise</text>
  <text x="170" y="360" fill="#1b1f27" font-size="12">categorical</text>
  <text x="290" y="360" fill="#1b1f27" font-size="12">Per window ▾</text>
  <rect x="410" y="350" width="22" height="16" rx="4" fill="#f3eef8"/><text x="421" y="362" text-anchor="middle" fill="#5b2d8e" font-size="10" font-weight="600">P</text>
  <rect x="436" y="350" width="22" height="16" rx="4" fill="#f3eef8"/><text x="447" y="362" text-anchor="middle" fill="#5b2d8e" font-size="10" font-weight="600">E</text>
  <rect x="462" y="350" width="22" height="16" rx="4" fill="#f3eef8"/><text x="473" y="362" text-anchor="middle" fill="#5b2d8e" font-size="10" font-weight="600">N</text>
  <line x1="32" y1="376" x2="528" y2="376" stroke="#edeef1"/>
  <text x="44" y="396" fill="#1b1f27" font-size="12">cooperation</text>
  <text x="170" y="396" fill="#1b1f27" font-size="12">binary</text>
  <text x="290" y="396" fill="#1b1f27" font-size="12">Per sender ▾</text>
  <rect x="410" y="386" width="22" height="16" rx="4" fill="#f3eef8"/><text x="421" y="398" text-anchor="middle" fill="#5b2d8e" font-size="10" font-weight="600">0</text>
  <rect x="436" y="386" width="22" height="16" rx="4" fill="#f3eef8"/><text x="447" y="398" text-anchor="middle" fill="#5b2d8e" font-size="10" font-weight="600">1</text>
  <text x="44" y="420" fill="#7c4daf" font-size="11" font-weight="600">+ Add Variable</text>

  <!-- participants -->
  <text x="32" y="464" fill="#5f6577" font-size="11" font-weight="600">PARTICIPANTS / SENDERS</text>
  <rect x="32" y="474" width="58" height="22" rx="11" fill="#eef" stroke="#c9c2e0"/><text x="61" y="489" text-anchor="middle" fill="#5b2d8e" font-size="11" font-weight="600">P  ×</text>
  <rect x="98" y="474" width="58" height="22" rx="11" fill="#eef" stroke="#c9c2e0"/><text x="127" y="489" text-anchor="middle" fill="#5b2d8e" font-size="11" font-weight="600">V1  ×</text>
  <rect x="164" y="474" width="58" height="22" rx="11" fill="#eef" stroke="#c9c2e0"/><text x="193" y="489" text-anchor="middle" fill="#5b2d8e" font-size="11" font-weight="600">V2  ×</text>
  <text x="32" y="528" fill="#9197a6" font-size="11">Per-sender variables expand to one column per participant:</text>
  <text x="32" y="546" fill="#9197a6" font-size="11">cooperation_P, cooperation_V1, cooperation_V2.</text>
  <text x="32" y="572" fill="#9197a6" font-size="10.5" font-style="italic">Coding scheme from Charness &amp; Dufwenberg (2006), “Promises and Partnerships.”</text>
</svg>
