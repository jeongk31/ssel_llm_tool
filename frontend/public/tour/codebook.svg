<svg xmlns="http://www.w3.org/2000/svg" width="560" height="600" viewBox="0 0 560 600" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <rect width="560" height="600" fill="#f4f5f7"/>
  <rect x="16" y="16" width="528" height="568" rx="8" fill="#ffffff" stroke="#d9dce3"/>
  <!-- header -->
  <rect x="30" y="34" width="19" height="19" rx="5" fill="#21262f"/>
  <text x="39" y="47" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <text x="58" y="48" fill="#1b1f27" font-size="14" font-weight="700">Codebook</text>

  <!-- empty messages -->
  <text x="32" y="82" fill="#5f6577" font-size="10" font-weight="600" letter-spacing="0.5">EMPTY MESSAGE HANDLING</text>
  <rect x="32" y="90" width="240" height="30" rx="5" fill="#fff" stroke="#d9dce3"/>
  <text x="44" y="110" fill="#1b1f27" font-size="11">Ignore (skip row) ▾</text>

  <!-- codebook variables -->
  <text x="32" y="172" fill="#5f6577" font-size="10" font-weight="600" letter-spacing="0.5">CODEBOOK VARIABLES</text>
  <!-- variable card -->
  <rect x="32" y="182" width="496" height="290" rx="7" fill="#fff" stroke="#d9dce3"/>
  <!-- top row -->
  <rect x="44" y="194" width="150" height="26" rx="5" fill="#fff" stroke="#d9dce3"/><text x="54" y="211" fill="#1b1f27" font-size="12" font-weight="600">promise</text>
  <rect x="202" y="194" width="120" height="26" rx="5" fill="#fff" stroke="#d9dce3"/><text x="212" y="211" fill="#1b1f27" font-size="11">categorical ▾</text>
  <rect x="330" y="194" width="120" height="26" rx="5" fill="#fff" stroke="#d9dce3"/><text x="340" y="211" fill="#1b1f27" font-size="11">per window ▾</text>
  <!-- category definition -->
  <text x="44" y="242" fill="#5f6577" font-size="9.5" font-weight="600" letter-spacing="0.4">CATEGORY DEFINITION</text>
  <rect x="44" y="248" width="472" height="34" rx="5" fill="#fff" stroke="#d9dce3"/>
  <text x="54" y="269" fill="#1b1f27" font-size="11">Does B promise to Roll if A chooses In?</text>
  <!-- coded values -->
  <text x="44" y="306" fill="#5f6577" font-size="9.5" font-weight="600" letter-spacing="0.4">CODED VALUES — one definition per value</text>
  <rect x="44" y="314" width="40" height="40" rx="5" fill="#fdf2f8" stroke="#f3d4e6"/><text x="64" y="339" text-anchor="middle" fill="#db2777" font-size="12" font-weight="700">P</text>
  <rect x="92" y="314" width="424" height="40" rx="5" fill="#fff" stroke="#d9dce3"/><text x="102" y="331" fill="#1b1f27" font-size="10.5">Explicit promise to roll (e.g. "if you choose In, I will roll").</text><text x="102" y="347" fill="#9197a6" font-size="9.5">examples · context</text>
  <rect x="44" y="360" width="40" height="40" rx="5" fill="#fdf2f8" stroke="#f3d4e6"/><text x="64" y="385" text-anchor="middle" fill="#db2777" font-size="12" font-weight="700">E</text>
  <rect x="92" y="360" width="424" height="40" rx="5" fill="#fff" stroke="#d9dce3"/><text x="102" y="377" fill="#1b1f27" font-size="10.5">Empty talk — greetings, jokes, no real promise.</text><text x="102" y="393" fill="#9197a6" font-size="9.5">examples · context</text>
  <rect x="44" y="406" width="40" height="40" rx="5" fill="#fdf2f8" stroke="#f3d4e6"/><text x="64" y="431" text-anchor="middle" fill="#db2777" font-size="12" font-weight="700">N</text>
  <rect x="92" y="406" width="424" height="40" rx="5" fill="#fff" stroke="#d9dce3"/><text x="102" y="423" fill="#1b1f27" font-size="10.5">No message — blank or opted out.</text><text x="102" y="439" fill="#9197a6" font-size="9.5">examples · context</text>
  <text x="44" y="464" fill="#7c4daf" font-size="11" font-weight="600">+ Add value</text>

  <text x="32" y="498" fill="#7c4daf" font-size="11" font-weight="600">+ Add variable</text>
  <text x="32" y="536" fill="#9197a6" font-size="10.5" font-style="italic">Per-sender variables expand to one column per participant (cooperation_P, cooperation_V1…).</text>
  <text x="32" y="560" fill="#9197a6" font-size="10" font-style="italic">Coding scheme from Charness &amp; Dufwenberg (2006), “Promises and Partnerships.”</text>
</svg>
