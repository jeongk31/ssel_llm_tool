<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <rect width="560" height="360" fill="#f5f6f8"/>
  <rect x="16" y="16" width="528" height="328" rx="10" fill="#ffffff" stroke="#e3e5ea"/>
  <circle cx="40" cy="44" r="11" fill="#5b2d8e"/>
  <text x="40" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
  <text x="60" y="48" fill="#1b1f27" font-size="14" font-weight="700">Experiment Instructions</text>
  <text x="32" y="84" fill="#5f6577" font-size="11" font-weight="600">DESCRIBE THE EXPERIMENT CONTEXT</text>
  <rect x="32" y="92" width="496" height="200" rx="6" fill="#fff" stroke="#e3e5ea"/>
  <text x="44" y="116" fill="#1b1f27" font-size="11.5">Player A chooses In or Out. If A chooses In, Player B then</text>
  <text x="44" y="136" fill="#1b1f27" font-size="11.5">decides whether to Roll the die or not.</text>
  <text x="44" y="160" fill="#1b1f27" font-size="11.5">If B rolls and the die is 2–6, both players earn more than</text>
  <text x="44" y="180" fill="#1b1f27" font-size="11.5">the $5 outside option. Before deciding, B may send A a</text>
  <text x="44" y="200" fill="#1b1f27" font-size="11.5">free-form message — for example, promising to roll.</text>
  <text x="44" y="224" fill="#9197a6" font-size="11.5">Each row is one message that Player B sent to Player A.</text>
  <rect x="44" y="244" width="170" height="1" fill="#edeef1"/>
  <text x="44" y="270" fill="#9197a6" font-size="10.5" font-style="italic">Example shown is from Charness &amp; Dufwenberg (2006),</text>
  <text x="44" y="284" fill="#9197a6" font-size="10.5" font-style="italic">“Promises and Partnerships,” Econometrica.</text>
  <text x="32" y="316" fill="#9197a6" font-size="11">The field grows to fit the full instructions you paste in.</text>
</svg>
